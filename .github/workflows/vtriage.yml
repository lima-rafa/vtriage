name: vtriage

on:
  push:
  pull_request:

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      # Run pode retornar exit code 1 (seeds FAIL são esperados no harness).
      # Então permitimos e garantimos o analyze em seguida.
      - name: Run quick (allow FAIL seeds)
        run: |
          vtriage run --workdir ./examples/zipcpu --profile quick --no-analyze || true

      # Analyze retorna:
      # 0 = ok (sem FAIL)
      # 1 = ok (com FAIL)  -> não queremos falhar o job no smoke
      # 2/3/4 = erro real  -> aí sim falha
      - name: Analyze latest (allow FAIL=1)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e
          vtriage analyze --latest --out ./report --reuse-index
          code=$?
          echo "analyze_exit=$code"
          if [ "$code" -eq 0 ] || [ "$code" -eq 1 ]; then
            exit 0
          fi
          exit "$code"

      - name: Analyze latest (allow FAIL=1) [Windows]
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vtriage analyze --latest --out ./report --reuse-index
          $code = $LASTEXITCODE
          Write-Host "analyze_exit=$code"
          if ($code -eq 0 -or $code -eq 1) { exit 0 }
          exit $code

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.os }}
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: artifacts/
