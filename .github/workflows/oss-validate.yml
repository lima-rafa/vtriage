name: oss-validate

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target to validate"
        type: choice
        required: true
        default: "zipcpu"
        options:
          - zipcpu
          - litex
          - vexriscv
          - all
      mode:
        description: "What to run"
        type: choice
        required: true
        default: "both"
        options:
          - smoke
          - real
          - both
  # (opcional) agenda semanal — deixe comentado por enquanto
  # schedule:
  #   - cron: "0 3 * * 1"

jobs:
  # ---------------------------
  # ZIPCPU — SMOKE
  # ---------------------------
  zipcpu-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'zipcpu' || github.event.inputs.target == 'all') && (github.event.inputs.mode == 'smoke' || github.event.inputs.mode == 'both') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: System deps (Verilator + libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator g++ make libelf-dev libncurses-dev git

      - name: Clone ZipCPU
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/ZipCPU/zipcpu.git _oss/zipcpu

      # Smoke: só valida que consegue "entrar" no repo e rodar algo bem curto.
      - name: vtriage run (ZipCPU smoke) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'verilator --version && make -n rtl'" \
            --workdir _oss/zipcpu \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-smoke-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-smoke-artifacts
          path: artifacts/

  # ---------------------------
  # ZIPCPU — REAL BUILD/TEST
  # ---------------------------
  zipcpu-real:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'zipcpu' || github.event.inputs.target == 'all') && (github.event.inputs.mode == 'real' || github.event.inputs.mode == 'both') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: System deps (Verilator + libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator g++ make libelf-dev libncurses-dev git

      - name: Clone ZipCPU
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/ZipCPU/zipcpu.git _oss/zipcpu

      - name: vtriage run (ZipCPU real build/test) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'make rtl && make -C sim/verilator div_tb mpy_tb && ./sim/verilator/div_tb && ./sim/verilator/mpy_tb'" \
            --workdir _oss/zipcpu \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-real-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-real-artifacts
          path: artifacts/

  # ---------------------------
  # LITEX — SMOKE
  # ---------------------------
  litex-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'litex' || github.event.inputs.target == 'all') && (github.event.inputs.mode == 'smoke' || github.event.inputs.mode == 'both') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable) + deps
        run: |
          python -m pip install -U pip wheel setuptools
          python -m pip install migen
          python -m pip install -e .

      - name: Clone LiteX
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/enjoy-digital/litex.git _oss/litex

      - name: Install LiteX (editable)
        run: |
          python -m pip install -e _oss/litex

      - name: vtriage run (LiteX smoke import) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'python -c \"import litex; print(\\\"litex-ok\\\")\"'" \
            --workdir _oss/litex \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: litex-smoke-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litex-smoke-artifacts
          path: artifacts/

  # ---------------------------
  # LITEX — REAL (leve, mas "real")
  # ---------------------------
  litex-real:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'litex' || github.event.inputs.target == 'all') && (github.event.inputs.mode == 'real' || github.event.inputs.mode == 'both') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable) + deps
        run: |
          python -m pip install -U pip wheel setuptools
          python -m pip install migen
          python -m pip install -e .

      - name: Clone LiteX
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/enjoy-digital/litex.git _oss/litex

      - name: Install LiteX (editable)
        run: |
          python -m pip install -e _oss/litex

      # Real: roda um comando de geração (não é full SoC build, mas é mais real que só import).
      - name: vtriage run (LiteX real command) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'python -m litex.soc.integration.soc_core --help >/dev/null && echo litex-real-ok'" \
            --workdir _oss/litex \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: litex-real-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litex-real-artifacts
          path: artifacts/

  # ---------------------------
  # VEXRISCV — SMOKE
  # ---------------------------
  vexriscv-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'vexriscv' || github.event.inputs.target == 'all') && (github.event.inputs.mode == 'smoke' || github.event.inputs.mode == 'both') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip wheel setuptools
          python -m pip install -e .

      - name: System deps (Java)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk git

      - name: Clone VexRiscv
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/SpinalHDL/VexRiscv.git _oss/vexriscv

      - name: vtriage run (VexRiscv smoke) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'java -version && ls -la | head -n 20'" \
            --workdir _oss/vexriscv \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-smoke-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-smoke-artifacts
          path: artifacts/

  # ---------------------------
  # VEXRISCV — REAL (compile)
  # ---------------------------
  vexriscv-real:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'vexriscv' || github.event.inputs.target == 'all') && (github.event.inputs.mode == 'real' || github.event.inputs.mode == 'both') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip wheel setuptools
          python -m pip install -e .

      - name: System deps (Java)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk git

      - name: Clone VexRiscv
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/SpinalHDL/VexRiscv.git _oss/vexriscv

      - name: Install sbt (if needed)
        shell: bash
        run: |
          if [ -f "_oss/vexriscv/sbt" ]; then
            echo "Using repo sbt script."
            chmod +x _oss/vexriscv/sbt || true
          else
            echo "Installing sbt..."
            sudo apt-get install -y sbt || true
          fi

      - name: vtriage run (VexRiscv real compile) -> analyze -> report (allow fail)
        shell: bash
        run: |
          if [ -f "./sbt" ]; then
            CMD="./sbt -no-colors compile"
          else
            CMD="sbt -no-colors compile"
          fi

          vtriage run \
            --seeds 1 \
            --cmd "bash -lc '$CMD'" \
            --workdir _oss/vexriscv \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-real-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-real-artifacts
          path: artifacts/
