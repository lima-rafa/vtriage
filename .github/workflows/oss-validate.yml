name: oss-validate

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
    zipcpu-real:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout vtriage
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - name: Install vtriage (editable)
          run: |
            python -m pip install -U pip
            python -m pip install -e .

        - name: System deps (Verilator + libs)
          run: |
            sudo apt-get update
            sudo apt-get install -y verilator g++ make libelf-dev libncurses-dev

        - name: Clone ZipCPU
          run: |
            git clone --depth 1 https://github.com/ZipCPU/zipcpu.git _oss/zipcpu

        - name: vtriage run (ZipCPU real build/test) -> analyze -> report
          run: |
            vtriage run \
              --seeds 1 \
              --cmd "bash -lc 'make rtl && make -C sim/verilator div_tb mpy_tb && ./sim/verilator/div_tb && ./sim/verilator/mpy_tb'" \
              --workdir _oss/zipcpu \
              --artifact-root artifacts \
              --out report \
              --profile quick || true

        - name: Upload report
          uses: actions/upload-artifact@v4
          with:
            name: zipcpu-report
            path: report/

        - name: Upload artifacts (runs)
          uses: actions/upload-artifact@v4
          with:
            name: zipcpu-artifacts
            path: artifacts/
