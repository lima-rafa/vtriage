name: vtriage

on:
  push:
  pull_request:

jobs:
  smoke:
    name: vtriage smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      # IMPORTANT: o harness gera FAILs de propósito (~30%), então não pode quebrar o job
      - name: Run + analyze (quick)  (allow FAIL seeds)
        run: |
          vtriage run --workdir ./examples/zipcpu --profile quick || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.os }}
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: artifacts/
