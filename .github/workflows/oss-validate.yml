name: oss-validate

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  zipcpu-real:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: System deps (Verilator + libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator g++ make libelf-dev libncurses-dev git

      - name: Clone ZipCPU
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/ZipCPU/zipcpu.git _oss/zipcpu

      # Aqui a gente faz run seeds=1 (porque é um “teste real”, não seed-based)
      # e permite falha sem quebrar o job, pra sempre gerar report/artifacts.
      - name: vtriage run (ZipCPU real build/test) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'make rtl && make -C sim/verilator div_tb mpy_tb && ./sim/verilator/div_tb && ./sim/verilator/mpy_tb'" \
            --workdir _oss/zipcpu \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          # analisa o run mais recente gerado
          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-artifacts
          path: artifacts/

      - name: Debug (show last logs on failure)
        if: failure()
        shell: bash
        run: |
          echo "Latest artifacts dir:"
          ls -la artifacts || true
          latest=$(ls -1 artifacts | grep '^run_' | sort -r | head -n 1 || true)
          echo "latest=$latest"
          if [ -n "$latest" ]; then
            find "artifacts/$latest/tests" -name log.txt -maxdepth 2 -print -exec tail -n 120 {} \; || true
          fi

  litex-real:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Clone LiteX
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/enjoy-digital/litex.git _oss/litex

      - name: Install LiteX deps (minimal)
        run: |
          python -m pip install -U wheel setuptools
          python -m pip install -r _oss/litex/requirements.txt

      # Smoke real: importa litex e roda um comando "leve"
      - name: vtriage run (LiteX smoke) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'python -c \"import litex; print(litex.__version__ if hasattr(litex, \\\"__version__\\\") else \\\"litex-ok\\\")\"'" \
            --workdir _oss/litex \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: litex-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litex-artifacts
          path: artifacts/
