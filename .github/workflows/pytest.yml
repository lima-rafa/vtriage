
name: pytest

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: pytest + coverage (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable) + dev deps
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      # Linux/macOS (bash): usar "\" para continuação de linha
      - name: Run pytest + coverage (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m pytest -q \
            --cov=vtriage \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=50

      # Windows (PowerShell): usar "`" para continuação de linha
      - name: Run pytest + coverage (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pytest -q `
            --cov=vtriage `
            --cov-report=term-missing `
            --cov-report=xml:coverage.xml `
            --cov-fail-under=50

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.os }}
          path: coverage.xml
          if-no-files-found: warn
