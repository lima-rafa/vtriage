name: oss-validate

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target to validate"
        type: choice
        required: true
        default: "zipcpu"
        options:
          - zipcpu
          - litex
          - vexriscv
          - all

jobs:
  # -------------------------
  # ZipCPU - SMOKE
  # -------------------------
  zipcpu-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'zipcpu' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: System deps (basic)
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: Clone ZipCPU
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/ZipCPU/zipcpu.git _oss/zipcpu

      - name: vtriage run (ZipCPU smoke) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'ls -la && git rev-parse --short HEAD && echo zipcpu-smoke-ok'" \
            --workdir _oss/zipcpu \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-smoke-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-smoke-artifacts
          path: artifacts/

  # -------------------------
  # ZipCPU - REAL (build+tests)
  # -------------------------
  zipcpu-real:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'zipcpu' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: System deps (Verilator + libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator g++ make libelf-dev libncurses-dev git

      - name: Clone ZipCPU
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/ZipCPU/zipcpu.git _oss/zipcpu

      - name: vtriage run (ZipCPU real build/test) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'make rtl && make -C sim/verilator div_tb mpy_tb && ./sim/verilator/div_tb && ./sim/verilator/mpy_tb'" \
            --workdir _oss/zipcpu \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-real-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-real-artifacts
          path: artifacts/

      - name: Debug (show last logs on failure)
        if: failure()
        shell: bash
        run: |
          echo "Latest artifacts dir:"
          ls -la artifacts || true
          latest=$(ls -1 artifacts | grep '^run_' | sort -r | head -n 1 || true)
          echo "latest=$latest"
          if [ -n "$latest" ]; then
            find "artifacts/$latest/tests" -name log.txt -maxdepth 2 -print -exec tail -n 120 {} \; || true
          fi

  # -------------------------
  # LiteX - SMOKE
  # -------------------------
  litex-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'litex' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Clone LiteX
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/enjoy-digital/litex.git _oss/litex

      - name: Install LiteX (editable) + deps
        shell: bash
        run: |
          python -m pip install -U wheel setuptools
          python -m pip install migen
          python -m pip install -e _oss/litex

      - name: vtriage run (LiteX smoke import) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'python -c \"import litex; print(\\\"litex-ok\\\")\"'" \
            --workdir _oss/litex \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: litex-smoke-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litex-smoke-artifacts
          path: artifacts/

  # -------------------------
  # LiteX - REAL (tests)
  # -------------------------
  litex-real:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'litex' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: System deps (optional)
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: Clone LiteX
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/enjoy-digital/litex.git _oss/litex

      - name: Install LiteX + test deps
        shell: bash
        run: |
          python -m pip install -U wheel setuptools
          python -m pip install migen
          python -m pip install -e _oss/litex
          python -m pip install pytest


      - name: vtriage run (LiteX full tests) -> analyze -> report (allow fail)
        shell: bash
        run: |
          ls -la _oss/litex
          find _oss/litex -maxdepth 3 -type f \( -name "test_*.py" -o -name "*_test.py" \) | head
          python -c "import litex, pkgutil; print('litex ok'); print('submodules:', sum(1 for _ in pkgutil.walk_packages(litex.__path__, litex.__name__ + '.')))"
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'python -m pytest -q'" \
            --workdir _oss/litex \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: litex-real-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litex-real-artifacts
          path: artifacts/

  # -------------------------
  # VexRiscv - SMOKE
  # -------------------------
  vexriscv-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'vexriscv' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip wheel setuptools
          python -m pip install -e .

      - name: System deps (Java + git)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk git

      - name: Clone VexRiscv
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/SpinalHDL/VexRiscv.git _oss/vexriscv

      - name: vtriage run (VexRiscv smoke compile) -> analyze -> report (allow fail)
        shell: bash
        run: |
          cd _oss/vexriscv
          if [ -f "./sbt" ]; then
            chmod +x ./sbt
            SBT_CMD="./sbt -no-colors"
          else
            sudo apt-get install -y sbt || true
            SBT_CMD="sbt -no-colors"
          fi
          cd - >/dev/null

          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'cd _oss/vexriscv && $SBT_CMD compile'" \
            --workdir . \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-smoke-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-smoke-artifacts
          path: artifacts/

  # -------------------------
  # VexRiscv - REAL (tests + cache)
  # -------------------------
  vexriscv-real:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'vexriscv' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip wheel setuptools
          python -m pip install -e .

      - name: System deps (Java + git)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk git

      - name: Clone VexRiscv
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/SpinalHDL/VexRiscv.git _oss/vexriscv

      - name: Cache sbt/coursier/ivy
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
            ~/.ivy2/cache
          key: ${{ runner.os }}-sbt-${{ hashFiles('_oss/vexriscv/**/build.sbt', '_oss/vexriscv/**/project/**', '_oss/vexriscv/**/build.properties') }}

      - name: vtriage run (VexRiscv full tests) -> analyze -> report (allow fail)
        shell: bash
        run: |
          cd _oss/vexriscv
          if [ -f "./sbt" ]; then
            chmod +x ./sbt
            SBT_CMD="./sbt -no-colors"
          else
            sudo apt-get install -y sbt || true
            SBT_CMD="sbt -no-colors"
          fi
          cd - >/dev/null

          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'cd _oss/vexriscv && $SBT_CMD test'" \
            --workdir . \
            --artifact-root artifacts \
            --out report \
            --no-analyze || true

          vtriage analyze --latest --out ./report --reuse-index

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-real-report
          path: report/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-real-artifacts
          path: artifacts/
