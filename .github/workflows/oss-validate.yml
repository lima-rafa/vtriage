name: oss-validate

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target to validate"
        type: choice
        required: true
        default: "zipcpu"
        options:
          - zipcpu
          - litex
          - vexriscv
          - all

jobs:
  # -------------------------
  # ZipCPU - SMOKE
  # -------------------------
  zipcpu-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'zipcpu' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: System deps (basic)
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: Clone ZipCPU
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/ZipCPU/zipcpu.git _oss/zipcpu

      - name: vtriage run (ZipCPU smoke) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'ls -la && git rev-parse --short HEAD && echo zipcpu-smoke-ok'" \
            --workdir _oss/zipcpu \
            --artifact-root artifacts \
            --out report \
            --no-analyze

          vtriage analyze --latest --out ./report --reuse-index --json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-smoke-report
          path: report/
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-smoke-artifacts
          path: artifacts/
          if-no-files-found: warn

  # -------------------------
  # ZipCPU - REAL (build+tests)
  # -------------------------
  zipcpu-real-full:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'zipcpu' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: System deps (Verilator + build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator g++ make libelf-dev libncurses-dev git

      - name: Clone ZipCPU
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/ZipCPU/zipcpu.git _oss/zipcpu

      - name: vtriage run (ZipCPU REAL FULL) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'set -e; make rtl; make -C sim/verilator div_tb mpy_tb; ./sim/verilator/div_tb; ./sim/verilator/mpy_tb'" \
            --workdir _oss/zipcpu \
            --artifact-root artifacts \
            --out report \
            --no-analyze

          vtriage analyze --latest --out ./report --reuse-index --json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-real-full-report
          path: report/
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zipcpu-real-full-artifacts
          path: artifacts/
          if-no-files-found: warn

      - name: Debug (show last logs on failure)
        if: failure()
        shell: bash
        run: |
          echo "Latest artifacts dir:"
          ls -la artifacts || true
          latest=$(ls -1 artifacts | grep '^run_' | sort -r | head -n 1 || true)
          echo "latest=$latest"
          if [ -n "$latest" ]; then
            find "artifacts/$latest/tests" -name log.txt -maxdepth 2 -print -exec tail -n 120 {} \; || true
          fi

  # -------------------------
  # LiteX - SMOKE
  # -------------------------
  litex-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'litex' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Clone LiteX
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/enjoy-digital/litex.git _oss/litex

      - name: Install LiteX (editable) + deps
        shell: bash
        run: |
          python -m pip install -U wheel setuptools
          python -m pip install migen
          python -m pip install -e _oss/litex

      - name: vtriage run (LiteX smoke import) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'python -c \"import litex; print(\\\"litex-ok\\\")\"'" \
            --workdir _oss/litex \
            --artifact-root artifacts \
            --out report \
            --no-analyze

          vtriage analyze --latest --out ./report --reuse-index --json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: litex-smoke-report
          path: report/
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litex-smoke-artifacts
          path: artifacts/
          if-no-files-found: warn

  # -------------------------
  # LiteX - REAL (tests)
  # -------------------------
  litex-real-full:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'litex' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: System deps (optional)
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: Clone LiteX
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/enjoy-digital/litex.git _oss/litex

      - name: Install LiteX + test deps
        shell: bash
        run: |
          python -m pip install -U pip wheel setuptools
          python -m pip install migen
          python -m pip install -e _oss/litex
          python -m pip install pytest


      - name: vtriage run (LiteX REAL FULL = pytest) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'set -e; python -m pytest -q'" \
            --workdir _oss/litex \
            --artifact-root artifacts \
            --out report \
            --no-analyze

          vtriage analyze --latest --out ./report --reuse-index --json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: litex-real-full-report
          path: report/
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litex-real-full-artifacts
          path: artifacts/
          if-no-files-found: warn

  # -------------------------
  # VexRiscv - SMOKE
  # -------------------------
  vexriscv-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'vexriscv' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip wheel setuptools
          python -m pip install -e .

      - name: System deps (Java + git)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk git

      - name: Clone VexRiscv
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/SpinalHDL/VexRiscv.git _oss/vexriscv

      - name: vtriage run (VexRiscv smoke compile) -> analyze -> report (allow fail)
        shell: bash
        run: |
          cd _oss/vexriscv
          if [ -f "./sbt" ]; then
            chmod +x ./sbt
            SBT_CMD="./sbt -no-colors"
          else
            sudo apt-get install -y sbt || true
            SBT_CMD="sbt -no-colors"
          fi
          cd - >/dev/null

          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'cd _oss/vexriscv && $SBT_CMD compile'" \
            --workdir . \
            --artifact-root artifacts \
            --out report \
            --no-analyze

          vtriage analyze --latest --out ./report --reuse-index --json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-smoke-report
          path: report/
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-smoke-artifacts
          path: artifacts/
          if-no-files-found: warn

  # -------------------------
  # VexRiscv - REAL (tests + cache)
  # -------------------------
  vexriscv-real-full:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'vexriscv' || github.event.inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 100

    steps:
      - name: Checkout vtriage
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vtriage (editable)
        run: |
          python -m pip install -U pip wheel setuptools
          python -m pip install -e .

      - name: System deps (Java + Verilator + build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y git make g++ verilator default-jdk curl gdb

      - name: Clone VexRiscv
        run: |
          mkdir -p _oss
          git clone --depth 1 https://github.com/SpinalHDL/VexRiscv.git _oss/vexriscv

      - name: Cache coursier/sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.local/share/coursier
          key: ${{ runner.os }}-coursier-${{ hashFiles('_oss/vexriscv/**/build.sbt', '_oss/vexriscv/**/project/**', '_oss/vexriscv/**/build.properties') }}

      - name: Install sbt via coursier (robust)
        shell: bash
        run: |
          set -e
          if ! command -v cs >/dev/null 2>&1; then
            curl -fL https://github.com/coursier/coursier/releases/latest/download/cs-x86_64-pc-linux.gz -o cs.gz
            gunzip -f cs.gz
            chmod +x cs
            sudo mv cs /usr/local/bin/cs
          fi
          cs setup --yes
          cs install sbt
          echo "$HOME/.local/share/coursier/bin" >> $GITHUB_PATH

      - name: VexRiscv Scala build (compile + test)
        shell: bash
        run: |
          cd _oss/vexriscv
          sbt -no-colors compile
          # se ficar pesado demais, troque "test" por "compile" apenas
          sbt -no-colors test

      - name: vtriage run (VexRiscv REAL FULL = Verilator regression multi-config) -> analyze -> report (allow fail)
        shell: bash
        run: |
          vtriage run \
            --seeds 1 \
            --cmd "bash -lc 'set -e; cd src/test/cpp/regression; \
            --cmd "bash -lc 'set -e; cd src/test/cpp/regression; \
              make clean run IBUS=SIMPLE  DBUS=SIMPLE  CSR=no  MMU=no  DEBUG_PLUGIN=no MUL=no  DIV=no; \
              make clean run IBUS=CACHED  DBUS=CACHED  CSR=yes MMU=no  DEBUG_PLUGIN=no MUL=yes DIV=yes; \
              make clean run IBUS=CACHED  DBUS=CACHED  CSR=yes MMU=yes DEBUG_PLUGIN=no MUL=yes DIV=yes'" \

            --workdir _oss/vexriscv \
            --artifact-root artifacts \
            --out report \
            --no-analyze

          vtriage analyze --latest --out ./report --reuse-index --json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-real-full-report
          path: report/
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vexriscv-real-full-report
          path: artifacts/
          if-no-files-found: warn
