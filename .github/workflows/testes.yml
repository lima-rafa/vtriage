name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install vtriage (editable) + dev deps
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: |
          python -m pytest -q
